{% extends 'base.html' %}

{% block title %}UWA SecondHand - Shopping Cart{% endblock %}

{% block content %}
    <section class="cart-container">
        <h1>Shopping Cart</h1>

        <div id="cartContent">
            <div class="loading">Loading cart...</div>
        </div>
    </section>

    <script>
        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('cartContent').innerHTML = '<div class="empty-state">Error loading cart</div>';
                    return;
                }

                const cart = data.cart;
                if (cart.items.length === 0) {
                    document.getElementById('cartContent').innerHTML = `
                        <div class="empty-state">
                            <p>Your cart is empty</p>
                            <a href="{{ url_for('browse_items') }}" class="btn btn-primary">Continue Shopping</a>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="cart-items">';
                cart.items.forEach(cartItem => {
                    const item = cartItem.item;
                    html += `
                        <div class="cart-item" data-item-id="${item.id}">
                            <div class="cart-item-image">
                                ${item.images && item.images.length > 0 
                                    ? `<img src="${item.images[0].url}" alt="${item.title}">` 
                                    : `<div class="placeholder">${item.category.substring(0, 3).toUpperCase()}</div>`}
                            </div>
                            <div class="cart-item-details">
                                <h3>${item.title}</h3>
                                <p class="seller-link">By ${item.seller.full_name || item.seller.username}</p>
                                <p class="price">$${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                            <div class="cart-item-quantity">
                                <label for="qty-${item.id}">Qty:</label>
                                <input type="number" id="qty-${item.id}" min="1" max="${item.quantity}" value="${cartItem.quantity}" data-item-id="${item.id}" class="qty-input">
                            </div>
                            <div class="cart-item-total">
                                <p>$${parseFloat(cartItem.item_total).toFixed(2)}</p>
                            </div>
                            <button class="btn btn-small btn-danger" data-item-id="${item.id}" data-remove-btn>Remove</button>
                        </div>
                    `;
                });
                html += '</div>';

                html += `
                    <div class="cart-summary">
                        <div class="summary-row">
                            <strong>Total (${cart.total_items} item${cart.total_items !== 1 ? 's' : ''}):</strong>
                            <strong class="total-price">$${parseFloat(cart.total_price).toFixed(2)}</strong>
                        </div>
                        <button id="checkoutBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Proceed to Checkout</button>
                        <a href="{{ url_for('browse_items') }}" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem; text-align: center; display: block;">Continue Shopping</a>
                    </div>
                `;

                document.getElementById('cartContent').innerHTML = html;

                // Add event listeners
                document.querySelectorAll('[data-remove-btn]').forEach(btn => {
                    btn.addEventListener('click', removeFromCart);
                });

                document.querySelectorAll('.qty-input').forEach(input => {
                    input.addEventListener('change', updateQuantity);
                });

                document.getElementById('checkoutBtn').addEventListener('click', checkout);
            } catch (error) {
                console.error('Error loading cart:', error);
                document.getElementById('cartContent').innerHTML = '<div class="empty-state">Error loading cart</div>';
            }
        }

        async function removeFromCart(e) {
            const itemId = e.target.dataset.itemId;
            try {
                const response = await fetch(`/api/cart/items/${itemId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    loadCart();
                } else {
                    alert('Error removing item: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error removing from cart:', error);
                alert('Error removing item from cart');
            }
        }

        async function updateQuantity(e) {
            const itemId = e.target.dataset.itemId;
            const quantity = parseInt(e.target.value);
            try {
                const response = await fetch(`/api/cart/items/${itemId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity })
                });
                const data = await response.json();
                if (data.success) {
                    loadCart();
                } else {
                    alert('Error updating quantity: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
                alert('Error updating quantity');
            }
        }

        async function checkout(e) {
            if (!confirm('Proceed with checkout?')) {
                return;
            }

            try {
                const response = await fetch('/api/cart/checkout', {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    alert('Purchase successful! ' + data.message);
                    window.location.href = '{{ url_for("dashboard_page") }}';
                } else {
                    alert('Error: ' + (data.error || 'Unknown error') + 
                          (data.errors ? '\n' + data.errors.join('\n') : ''));
                }
            } catch (error) {
                console.error('Error during checkout:', error);
                alert('Error during checkout');
            }
        }

        // Load cart on page load
        loadCart();
    </script>

    <style>
        .cart-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .cart-items {
            margin-bottom: 2rem;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            overflow: hidden;
            border-radius: 4px;
            background: #f5f5f5;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #999;
        }

        .cart-item-details h3 {
            margin: 0;
            font-size: 1rem;
        }

        .cart-item-details .seller-link,
        .cart-item-details .price {
            margin: 0.25rem 0;
            font-size: 0.9rem;
            color: #666;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-input {
            width: 60px;
            padding: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .cart-item-total {
            min-width: 80px;
            text-align: right;
            font-weight: bold;
        }

        .cart-summary {
            background: #f9f9f9;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .total-price {
            color: #d32f2f;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #f9f9f9;
            border-radius: 8px;
            color: #666;
        }

        .empty-state p {
            margin: 1rem 0;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 0.5rem;
            }

            .cart-item-quantity,
            .cart-item-total {
                grid-column: 2;
            }
        }
    </style>
{% endblock %}
