{% extends 'base.html' %}

{% block title %}UWA SecondHand - Register{% endblock %}

{% block content %}
    <section class="auth-container">
        <div class="auth-card auth-card-wide">
            <h1>Create your UWA account</h1>
            <p class="panel-text auth-helper">Registration is restricted to {{ uwa_student_domain }} addresses so only UWA students can join.</p>
            <form method="post" action="{{ url_for('register_page') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="form-group">
                    <label for="registerFullName">Full name</label>
                    <input type="text" id="registerFullName" name="full_name" value="{{ form_data.get('full_name', '') }}" required>
                </div>

                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" name="username" value="{{ form_data.get('username', '') }}" required>
                </div>

                <div class="form-group">
                    <label for="registerEmail">UWA student email</label>
                    <input type="email" id="registerEmail" name="email" value="{{ form_data.get('email', '') }}" placeholder="name@student.uwa.edu.au" required>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" name="password" minlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <p class="auth-link">
                Already registered?
                <a href="{{ url_for('login_page') }}">Login here</a>
            </p>
        </div>
    </section>
{% endblock %}
