<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Wheel Customizer</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --card: #fffaf2;
      --text: #2f241e;
      --accent: #d97706;
      --accent-2: #0f766e;
      --muted: #7b665a;
      --line: #e7d7c6;
      --good: #166534;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #fdf3cc 0%, transparent 40%),
        radial-gradient(circle at 85% 10%, #d1fae5 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(47, 36, 30, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .top-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    select {
      width: 100%;
      border: 1px solid #d8c2ae;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fffdf9;
    }

    select:focus {
      outline: 2px solid #fde68a;
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid #d8c2ae;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fffdf9;
    }

    input:focus {
      outline: 2px solid #fde68a;
      border-color: var(--accent);
    }

    .summary {
      margin-top: 16px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .bars {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .bar {
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
      height: 24px;
      position: relative;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f59e0b);
      transition: width 200ms ease;
    }

    .bar span {
      position: absolute;
      left: 10px;
      top: 3px;
      font-size: 0.8rem;
      color: #1f130d;
      font-weight: 600;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: transform 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .upload-btn {
      width: 100%;
      border: 1px solid #d8c2ae;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
      background: #fffdf9;
    }

    .upload-btn:hover {
      transform: none;
      background: #fff4e4;
    }

    .game-preview {
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      display: none;
    }

    .game-preview h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .preview-kind {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .wheel-simple {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .wheel-stage {
      position: relative;
      width: min(320px, 85vw);
      aspect-ratio: 1;
    }

    .wheel-disc {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid #f3e2cf;
      background: conic-gradient(
        #ef4444 0deg 120deg,
        #3b82f6 120deg 240deg,
        #facc15 240deg 360deg
      );
      box-shadow: inset 0 0 0 2px rgba(31, 19, 13, 0.12), 0 8px 16px rgba(31, 19, 13, 0.18);
      position: relative;
      overflow: hidden;
    }

    .wheel-center {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #fffaf2;
      border: 3px solid rgba(31, 19, 13, 0.2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #4a3a31;
    }

    .wheel-pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 24px solid #2f241e;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.2));
      z-index: 3;
    }

    .wheel-label {
      position: absolute;
      font-weight: 700;
      font-size: 0.85rem;
      max-width: 120px;
      text-align: center;
      line-height: 1.2;
      color: #1f130d;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.6);
      z-index: 2;
    }

    .label-1 {
      top: 20%;
      left: 66%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
    }

    .label-2 {
      top: 68%;
      left: 62%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
    }

    .label-3 {
      top: 50%;
      left: 24%;
      transform: translate(-50%, -50%);
    }

    .ball-list {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .ball {
      border-radius: 999px;
      min-height: 56px;
      display: grid;
      place-content: center;
      text-align: center;
      color: #1f130d;
      font-weight: 700;
      font-size: 0.86rem;
      padding: 6px;
      border: 2px solid rgba(31, 19, 13, 0.14);
    }

    .ball-red {
      background: #ef4444;
      color: #fff;
    }

    .ball-blue {
      background: #3b82f6;
      color: #fff;
    }

    .ball-yellow {
      background: #facc15;
      color: #1f130d;
    }

    #status {
      min-height: 24px;
      font-size: 0.95rem;
      color: var(--warn);
      font-weight: 600;
    }

    #status.success {
      color: var(--good);
    }

    @media (max-width: 600px) {
      .row {
        grid-template-columns: 1fr;
      }

      .wheel-label {
        font-size: 0.76rem;
        max-width: 90px;
      }

      .ball-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Lucky Wheel Customizer</h1>
    <p class="sub">Default setup includes 3 prizes with rate 30 / 30 / 40.</p>

    <section class="game-preview" id="gamePreview">
      <h2>Wheel Preview</h2>
      <p class="preview-kind" id="previewKind"></p>
      <div class="wheel-simple" id="wheelSimple">
        <div class="wheel-stage">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel-disc" aria-hidden="true">
            <div class="wheel-label label-1" id="label1">Prize A</div>
            <div class="wheel-label label-2" id="label2">Prize B</div>
            <div class="wheel-label label-3" id="label3">Prize C</div>
            <div class="wheel-center">SPIN</div>
          </div>
        </div>
        <div class="ball-list" id="ballList"></div>
      </div>
    </section>

    <section class="top-controls">
      <div>
        <label for="gameKind">Game kind</label>
        <select id="gameKind">
          <option value="Lucky Wheel">Lucky Wheel</option>
          <option value="Lucky Cards">Lucky Cards</option>
          <option value="Lucky Balls">Lucky Balls</option>
        </select>
      </div>
    </section>

    <section class="grid" id="prizeEditor">
      <div class="row">
        <div>
          <label for="name1">Prize 1</label>
          <input id="name1" value="Prize A" maxlength="40">
        </div>
        <div>
          <label for="rate1">Rate %</label>
          <input id="rate1" type="number" min="0" max="100" value="30">
        </div>
        <div>
          <label>Prize image</label>
          <button class="upload-btn" type="button">Upload Image</button>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="name2">Prize 2</label>
          <input id="name2" value="Prize B" maxlength="40">
        </div>
        <div>
          <label for="rate2">Rate %</label>
          <input id="rate2" type="number" min="0" max="100" value="30">
        </div>
        <div>
          <label>Prize image</label>
          <button class="upload-btn" type="button">Upload Image</button>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="name3">Prize 3</label>
          <input id="name3" value="Prize C" maxlength="40">
        </div>
        <div>
          <label for="rate3">Rate %</label>
          <input id="rate3" type="number" min="0" max="100" value="40">
        </div>
        <div>
          <label>Prize image</label>
          <button class="upload-btn" type="button">Upload Image</button>
        </div>
      </div>
    </section>

    <div class="summary" id="totalSummary">Total rate: 100%</div>
    <div class="bars" id="bars"></div>

    <div class="actions">
      <button id="createBtn" type="button">Create</button>
      <div id="status" aria-live="polite"></div>
    </div>
  </main>

  <script>
    const inputs = [
      { name: document.getElementById('name1'), rate: document.getElementById('rate1') },
      { name: document.getElementById('name2'), rate: document.getElementById('rate2') },
      { name: document.getElementById('name3'), rate: document.getElementById('rate3') }
    ];

    const totalSummary = document.getElementById('totalSummary');
    const bars = document.getElementById('bars');
    const status = document.getElementById('status');
    const gameKind = document.getElementById('gameKind');
    const gamePreview = document.getElementById('gamePreview');
    const previewKind = document.getElementById('previewKind');
    const wheelSimple = document.getElementById('wheelSimple');
    const label1 = document.getElementById('label1');
    const label2 = document.getElementById('label2');
    const label3 = document.getElementById('label3');
    const ballList = document.getElementById('ballList');

    function getConfig() {
      return inputs.map((item, idx) => ({
        id: idx + 1,
        name: item.name.value.trim() || `Prize ${idx + 1}`,
        rate: Number(item.rate.value) || 0
      }));
    }

    function renderPreview() {
      const config = getConfig();
      const total = config.reduce((sum, p) => sum + p.rate, 0);
      totalSummary.textContent = `Total rate: ${total}%`;
      totalSummary.style.color = total === 100 ? 'var(--good)' : 'var(--warn)';

      bars.innerHTML = config
        .map((prize) => {
          const width = Math.max(0, Math.min(prize.rate, 100));
          return `
            <div class="bar">
              <div class="fill" style="width: ${width}%;"></div>
              <span>${prize.name} (${prize.rate}%)</span>
            </div>
          `;
        })
        .join('');
    }

    inputs.forEach((item) => {
      item.name.addEventListener('input', renderPreview);
      item.rate.addEventListener('input', renderPreview);
    });

    document.getElementById('createBtn').addEventListener('click', () => {
      status.classList.remove('success');
      const config = getConfig();
      const total = config.reduce((sum, p) => sum + p.rate, 0);

      if (total !== 100) {
        status.textContent = 'Please make total rate equal to 100% before creating.';
        return;
      }

      const ballClasses = ['ball-red', 'ball-blue', 'ball-yellow'];
      label1.textContent = config[0] ? config[0].name : 'Prize 1';
      label2.textContent = config[1] ? config[1].name : 'Prize 2';
      label3.textContent = config[2] ? config[2].name : 'Prize 3';

      ballList.innerHTML = config
        .slice(0, 3)
        .map((prize, idx) => `
          <div class="ball ${ballClasses[idx] || 'ball-yellow'}">
            <div>${prize.name}</div>
          </div>
        `)
        .join('');

      previewKind.textContent = `Game kind: ${gameKind.value}`;
      gamePreview.style.display = 'block';

      status.classList.add('success');
      status.textContent = 'Created. Preview is shown above.';
    });

    renderPreview();
  </script>
</body>
</html>
